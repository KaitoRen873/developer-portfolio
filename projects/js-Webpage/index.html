<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To‑Do Webpage · Riku Tenko</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --bg: #ffffff;
      --text: #1e293b;
      --card: #f8fafc;
      --border: #e2e8f0;
      --primary: #3b82f6;
      --danger: #ef4444;
    }
    body.dark {
      --bg: #0f172a;
      --text: #f1f5f9;
      --card: #1e293b;
      --border: #334155;
      --primary: #60a5fa;
      --danger: #f87171;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s, color 0.2s;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      flex: 1;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 30px;
    }
    .back-link {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
    .theme-toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 30px;
      width: 40px;
      height: 40px;
      cursor: pointer;
      color: var(--text);
    }
    h1 { margin-bottom: 20px; font-size: 2rem; }
    .app-card {
      background: var(--card);
      border-radius: 24px;
      padding: 24px;
      border: 1px solid var(--border);
    }
    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }
    .input-group input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 40px;
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
    }
    .input-group button {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 40px;
      padding: 0 24px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .input-group button:hover { opacity: 0.9; }
    .todo-list {
      list-style: none;
    }
    .todo-item {
      display: flex;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .todo-item input[type="checkbox"] {
      margin-right: 12px;
      width: 20px;
      height: 20px;
      accent-color: var(--primary);
    }
    .todo-item span {
      flex: 1;
      font-size: 1.1rem;
    }
    .todo-item span.completed {
      text-decoration: line-through;
      opacity: 0.6;
    }
    .delete-btn {
      background: none;
      border: none;
      color: var(--danger);
      cursor: pointer;
      font-size: 1.2rem;
      padding: 8px;
    }
    .empty-message {
      text-align: center;
      color: var(--text);
      opacity: 0.6;
      padding: 30px 0;
    }
    footer {
      text-align: center;
      padding: 20px;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="../../index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
      <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
    </header>

    <div class="app-card">
      <h1><i class="fas fa-check-circle" style="color: var(--primary);"></i> To‑Do List</h1>
      <div class="input-group">
        <input type="text" id="todoInput" placeholder="Add a new task..." autocomplete="off">
        <button id="addBtn"><i class="fas fa-plus"></i> Add</button>
      </div>
      <ul class="todo-list" id="todoList"></ul>
    </div>

    <footer>
      <p>© 2026 Riku Tenko · JavaScript App Project</p>
    </footer>
  </div>

  <script>
    (function(){
      // ---------- DARK MODE ----------
      const toggle = document.getElementById('themeToggle');
      const icon = toggle.querySelector('i');
      const body = document.body;
      const savedTheme = localStorage.getItem('theme-todo');
      if (savedTheme === 'dark') {
        body.classList.add('dark');
        icon.classList.remove('fa-moon');
        icon.classList.add('fa-sun');
      }
      toggle.addEventListener('click', () => {
        body.classList.toggle('dark');
        const isDark = body.classList.contains('dark');
        icon.classList.toggle('fa-moon', !isDark);
        icon.classList.toggle('fa-sun', isDark);
        localStorage.setItem('theme-todo', isDark ? 'dark' : 'light');
      });

      // ---------- TO-DO APP ----------
      const input = document.getElementById('todoInput');
      const addBtn = document.getElementById('addBtn');
      const list = document.getElementById('todoList');

      // Load from localStorage
      let todos = JSON.parse(localStorage.getItem('todos')) || [];

      function saveTodos() {
        localStorage.setItem('todos', JSON.stringify(todos));
      }

      function renderTodos() {
        if (todos.length === 0) {
          list.innerHTML = `<li class="empty-message"><i class="far fa-smile"></i> All caught up! Add a task.</li>`;
          return;
        }
        list.innerHTML = todos.map((todo, index) => `
          <li class="todo-item" data-index="${index}">
            <input type="checkbox" ${todo.completed ? 'checked' : ''}>
            <span class="${todo.completed ? 'completed' : ''}">${escapeHTML(todo.text)}</span>
            <button class="delete-btn" title="Delete"><i class="fas fa-trash-alt"></i></button>
          </li>
        `).join('');

        // Attach event listeners
        document.querySelectorAll('.todo-item').forEach(item => {
          const idx = item.dataset.index;
          const checkbox = item.querySelector('input[type="checkbox"]');
          const deleteBtn = item.querySelector('.delete-btn');

          checkbox.addEventListener('change', (e) => {
            todos[idx].completed = checkbox.checked;
            saveTodos();
            renderTodos();
          });

          deleteBtn.addEventListener('click', () => {
            todos.splice(idx, 1);
            saveTodos();
            renderTodos();
          });
        });
      }

      // Simple escape to prevent XSS
      function escapeHTML(str) {
        return str.replace(/[&<>"]/g, function(m) {
          if (m === '&') return '&amp;';
          if (m === '<') return '&lt;';
          if (m === '>') return '&gt;';
          if (m === '"') return '&quot;';
          return m;
        });
      }

      function addTodo() {
        const text = input.value.trim();
        if (text === '') return;
        todos.push({ text, completed: false });
        saveTodos();
        renderTodos();
        input.value = '';
        input.focus();
      }

      addBtn.addEventListener('click', addTodo);
      input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addTodo();
      });

      // Initial render
      renderTodos();
    })();
  </script>
</body>
</html>
